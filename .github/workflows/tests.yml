name: template combinations

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: uv run --with pytest,cookiecutter,pytest-xdist pytest tests/test_template_combinations.py -n auto
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: ["other-package", "python-package"]
        python_build_backend: ["hatchling", "setuptools"]
        python_c_extensions: [false, true]
        task_runner: ["none", "nox", "tox"]
        crds_observatory: ["none"]
        include:
          - directory: "python-package"
            python_build_backend: "hatchling"
            task_runner: "nox"
            crds_observatory: "none"
          - directory: "python-package"
            python_build_backend: "hatchling"
            task_runner: "nox"
            crds_observatory: "roman"
          - directory: "python-package"
            python_build_backend: "hatchling"
            task_runner: "tox"
            crds_observatory: "none"
          - directory: "python-package"
            python_build_backend: "hatchling"
            task_runner: "tox"
            crds_observatory: "roman"
          - directory: "python-package"
            python_build_backend: "setuptools"
            python_c_extensions: true
        exclude:
          - directory: "other-package"
            task_runner: "nox"
          - directory: "other-package"
            task_runner: "tox"
          - directory: "other-package"
            python_build_backend: "setuptools"
          - directory: "other-package"
            python_build_backend: "setuptools"
          - directory: "other-package"
            python_c_extensions: true
          - python_build_backend: "hatchling"
            python_c_extensions: true
    name: lint ${{ matrix.directory }}${{ matrix.directory == 'python-package' && format(' ({0}{1}{2}{3})', matrix.python_build_backend, matrix.python_c_extensions && ' with C extensions' || '', matrix.task_runner != 'none' && format(', {0}', matrix.task_runner) || '', matrix.crds_observatory != 'none' && format(', {0} CRDS', matrix.crds_observatory) || '') || '' }}
    steps:
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: uvx cookiecutter ${{ matrix.directory }} --no-input -o ../ project_name=test_${{ strategy.job-index }} publish_docs_to="readthedocs.io" ${{ matrix.directory == 'python-package' && format('task_runner={0}', matrix.task_runner) || '' }} ${{ matrix.directory == 'python-package' && format('python_build_backend={0}', matrix.python_build_backend) || '' }} ${{ matrix.directory == 'python-package' && format('python_c_extensions={0}', matrix.python_c_extensions) || '' }} ${{ matrix.directory == 'python-package' && format('crds_observatory={0}', matrix.crds_observatory) || '' }}
      - run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - run: ./actionlint ../test_${{ strategy.job-index }}/.github/workflows/*
      - run: uvx yamllint ../test_${{ strategy.job-index }}/.readthedocs.yaml
      - if: matrix.directory == 'python-package'
        run: uvx tomllint ../test_${{ strategy.job-index }}/pyproject.toml
