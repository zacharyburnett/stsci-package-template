[towncrier]
filename = "CHANGES.rst"
directory = "changes/"
ignore = ["README.md"]
title_format = "{version} ({project_date})"
issue_format = "`#{issue} <{{ cookiecutter.repository_url }}/issues/{issue}>`_"
wrap = true

[[towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[towncrier.type]]
directory = "feature"
name = "New Features"
showcontent = true

[[towncrier.type]]
directory = "fix"
name = "Fixes"
showcontent = true

[[towncrier.type]]
directory = "docs"
name = "Documentation Changes"
showcontent = true

[[towncrier.type]]
directory = "other"
name = "Other Changes"
showcontent = false

