# yaml-language-server: $schema=https://raw.githubusercontent.com/readthedocs/readthedocs.org/refs/heads/main/readthedocs/rtd_tests/fixtures/spec/v2/schema.json
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: latest
  apt_packages:
    - graphviz
  jobs:
{%- if cookiecutter.publish_docs_to == 'readthedocs.io' %}
    post_checkout:
      - git fetch --unshallow --tags
{%- endif %}
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv $READTHEDOCS_VIRTUALENV_PATH
    install:
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --group docs --link-mode=copy
{%- if cookiecutter.publish_docs_to == 'readthedocs.io' %}
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv pip install -e . towncrier
    pre_build:
      - git describe --exact-match || UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv run towncrier build --keep
{%- endif %}
    build:
      html:
        - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv run sphinx-build docs/ -T -W --keep-going --builder html -d _build/doctrees -D language=en $READTHEDOCS_OUTPUT/html/
